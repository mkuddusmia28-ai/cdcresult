<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পরীক্ষার ফলাফল</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    color:#0066cc;
}
input{
    width:70%;
    padding:10px;
    font-size:16px;
}
button{
    padding:10px 15px;
    background:#0066cc;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#004a99;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
}
th{
    background:#0066cc;
    color:white;
}
.error{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📚 পরীক্ষার ফলাফল</h2>

<input type="text" id="roll" placeholder="রোল লিখুন">
<button onclick="searchResult()">সার্চ</button>

<div id="result"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

// ✅ FIXED CSV LINK
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRICJ21HGMb_MmipR-RKlbZ1riWooVL3hIBl4H0cezqVAqdRcVOy5VO_WbFdF1WeeKta4v4Fw1QOOhc/pub?output=csv";

let students = [];

// Load CSV
Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,

    transformHeader: h => h.trim(),

    complete: function(res){
        students = res.data;
        console.log("Data Loaded:", students);
    },

    error: function(err){
        console.log("CSV Load Error:", err);
    }
});

// Clean function
function clean(v){
    return String(v || "").trim();
}

// Search function
function searchResult(){

    if(students.length === 0){
        alert("ডাটা লোড হচ্ছে... একটু অপেক্ষা করুন");
        return;
    }

    const roll = clean(document.getElementById("roll").value);

    const student = students.find(s =>
        clean(s["রোল"]) === roll
    );

    const result = document.getElementById("result");

    if(student){

        result.innerHTML = `
        <h3>📌 শিক্ষার্থীর তথ্য</h3>

        <table>
            <tr><th>বিষয়</th><th>মান</th></tr>
            <tr><td>রোল</td><td>${clean(student["রোল"])}</td></tr>
            <tr><td>নাম</td><td>${clean(student["নাম"])}</td></tr>
            <tr><td>বিভাগ</td><td>${clean(student["বিভাগ"])}</td></tr>
        </table>

        <h3>📚 বিষয়ভিত্তিক নম্বর</h3>

        <table>
            <tr><th>বিষয়</th><th>নম্বর</th></tr>
            <tr><td>বাংলা</td><td>${clean(student["বাংলা"])}</td></tr>
            <tr><td>ইংরেজী</td><td>${clean(student["ইংরেজী"])}</td></tr>
            <tr><td>আইসিটি</td><td>${clean(student["আইসিটি"])}</td></tr>
            <tr><td>হিসাব বিজ্ঞান</td><td>${clean(student["হিসাব বিজ্ঞান"])}</td></tr>
            <tr><td>ব্যবস্থাপনা</td><td>${clean(student["ব্যবস্থাপনা"])}</td></tr>
            <tr><td>ব্যব. সংগঠন</td><td>${clean(student["ব্যব. সংগঠন"])}</td></tr>
            <tr><td>ফিনান্স ব্যাংকিং</td><td>${clean(student["ফিনান্স ব্যাংকিং"])}</td></tr>
            <tr>
                <th>মোট</th>
                <th>${clean(student["মোট"])}</th>
            </tr>
        </table>
        `;

    } else {
        result.innerHTML = "<p class='error'>❌ এই রোলের ফলাফল পাওয়া যায়নি</p>";
    }
}

</script>

</body>
</html>
