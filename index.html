<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRICJ21HGMb_MmipR-RKlbZ1riWooVL3hIBl4H0cezqVAqdRcVOy5VO_WbFdF1WeeKta4v4Fw1QOOhc/pub?output=csv";

let students = [];

// CSV load + HEADER CLEAN FIX
Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,

    transformHeader: function(header) {
        return header.trim(); // 🔥 header space fix
    },

    complete: function(res) {
        students = res.data;
        console.log("Loaded Data:", students);
    }
});

// clean function
function clean(v){
    return String(v || "").trim();
}

function searchResult(){

    const roll = clean(document.getElementById("roll").value);

    const student = students.find(s =>
        clean(s["রোল"]) === roll
    );

    const result = document.getElementById("result");

    if(student){

        result.innerHTML = `
        <h3>📌 শিক্ষার্থীর তথ্য</h3>

        <table>
            <tr><th>বিষয়</th><th>মান</th></tr>
            <tr><td>রোল</td><td>${clean(student["রোল"])}</td></tr>
            <tr><td>নাম</td><td>${clean(student["নাম"])}</td></tr>
            <tr><td>বিভাগ</td><td>${clean(student["বিভাগ"])}</td></tr>
        </table>

        <h3>📚 বিষয়ভিত্তিক নম্বর</h3>

        <table>
            <tr><th>বিষয়</th><th>নম্বর</th></tr>
            <tr><td>বাংলা</td><td>${clean(student["বাংলা"])}</td></tr>
            <tr><td>ইংরেজী</td><td>${clean(student["ইংরেজী"])}</td></tr>
            <tr><td>আইসিটি</td><td>${clean(student["আইসিটি"])}</td></tr>
            <tr><td>হিসাব বিজ্ঞান</td><td>${clean(student["হিসাব বিজ্ঞান"])}</td></tr>
            <tr><td>ব্যবস্থাপনা</td><td>${clean(student["ব্যবস্থাপনা"])}</td></tr>
            <tr><td>ব্যব. সংগঠন</td><td>${clean(student["ব্যব. সংগঠন"])}</td></tr>
            <tr><td>ফিনান্স ব্যাংকিং</td><td>${clean(student["ফিনান্স ব্যাংকিং"])}</td></tr>
            <tr>
                <th>মোট</th>
                <th>${clean(student["মোট"])}</th>
            </tr>
        </table>
        `;

    } else {
        result.innerHTML = "<p style='color:red'>❌ এই রোলের ফলাফল পাওয়া যায়নি</p>";
    }
}
</script>
