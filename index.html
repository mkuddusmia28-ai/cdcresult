<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Search System</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
}

.container{
    margin-top:40px;
}

input{
    padding:10px;
    width:250px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.card{
    background:white;
    display:inline-block;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">
    <h2>Student Result Search</h2>

    <input type="text" id="roll" placeholder="Enter Roll">
    <button onclick="searchStudent()">Search</button>

    <div id="result"></div>
</div>

<script>

let students = [];

// 🔴 তোমার Google Sheet CSV link এখানে দাও
const url = "PASTE_YOUR_CSV_LINK_HERE";

// 🔥 data load function (AUTO UPDATE)
async function loadData(){
    try{
        const res = await fetch(url + "&t=" + new Date().getTime());
        const text = await res.text();

        let rows = text.trim().split("\n");
        let headers = rows[0].split(",");

        students = [];

        for(let i=1;i<rows.length;i++){
            let values = rows[i].split(",");
            let obj = {};

            headers.forEach((h,index)=>{
                obj[h.trim()] = values[index] ? values[index].trim() : "N/A";
            });

            students.push(obj);
        }

    }catch(err){
        console.log("Data load error:",err);
    }
}

// 🔥 search function
function searchStudent(){

    let roll = document.getElementById("roll").value.trim();
    let result = document.getElementById("result");

    let s = students.find(x => x["ROLL"] == roll);

    if(!s){
        result.innerHTML = "<p style='color:red'>কোনো ডাটা পাওয়া যায়নি</p>";
        return;
    }

    result.innerHTML = `
    <div class="card">
        <h3>নাম: ${s["CANDIDATE'S NAME"] || "N/A"}</h3>
        <p>রোল: ${s["ROLL"] || "N/A"}</p>
        <p>বিভাগ: ${s["GROUP TYPE"] || "N/A"}</p>
        <p>বাংলা: ${s["বাংলা"] || "N/A"}</p>
        <p>ইংরেজি: ${s["ইংরেজি"] || "N/A"}</p>
        <p>আইসিটি: ${s["আইসিটি"] || "N/A"}</p>
        <p>হিসাববিজ্ঞান: ${s["হিসাববিজ্ঞান"] || "N/A"}</p>
        <p>ব্যবসায় সংগঠন: ${s["ব্যবসায় সংগঠন"] || "N/A"}</p>
        <p>ব্যবস্থাপনা: ${s["ব্যবস্থাপনা"] || "N/A"}</p>
        <p>ফিন্যান্স ব্যাংকিং: ${s["ফিন্যান্স ব্যাংকিং"] || "N/A"}</p>
        <h3>মোট: ${s["মোট"] || "N/A"}</h3>
    </div>
    `;
}

// 🔥 page load হলে data আসবে
loadData();

// 🔥 auto refresh (Google Sheet update detect)
setInterval(loadData, 10000); // প্রতি 10 সেকেন্ডে update check করবে

</script>

</body>
</html>
