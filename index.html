<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শিক্ষার্থীর ফলাফল</title>

<style>
body{
    font-family: SolaimanLipi, Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}
h1{
    text-align:center;
    color:#0066cc;
}
input{
    width:70%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}
button{
    padding:12px 20px;
    background:#0066cc;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#004c99;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
table,th,td{
    border:1px solid #ddd;
}
th,td{
    padding:10px;
    text-align:center;
}
th{
    background:#0066cc;
    color:white;
}
.result{
    margin-top:20px;
}
.info{
    font-size:18px;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="container">
<h1>📘 শিক্ষার্থীর ফলাফল</h1>

<center>
<input type="text" id="roll" placeholder="রোল নম্বর লিখুন">
<button onclick="searchResult()">ফলাফল দেখুন</button>
</center>

<div id="result" class="result"></div>

</div>

<script>
const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6XYX-1NbB9VaFLmWKAi_Qjd5wy3_vWTTvPhP6kSW6eYZB-eGEhjT2mOiPQeSrZI7jRjUcf5uI_QuW/pub?gid=0&single=true&output=csv";

let students=[];

fetch(csvUrl)
.then(r=>r.text())
.then(data=>{
    const rows=data.trim().split("\n");
    const headers=rows[0].split(",");

    for(let i=1;i<rows.length;i++){
        const values=rows[i].split(",");
        let obj={};
        headers.forEach((h,index)=>{
            obj[h.trim()]=values[index]?.trim();
        });
        students.push(obj);
    }
});

function searchResult(){

const roll=document.getElementById("roll").value.trim();

const student=students.find(
s=>s["রোল"]==roll
);

const result=document.getElementById("result");

if(!student){
result.innerHTML="<h3 style='color:red'>ফলাফল পাওয়া যায়নি</h3>";
return;
}

result.innerHTML=`

<div class="info">
<b>নাম:</b> ${student["নাম"]}<br>
<b>রোল:</b> ${student["রোল"]}<br>
<b>বিভাগ:</b> ${student["বিভাগ"]}
</div>

<table>
<tr>
<th>বিষয়</th>
<th>নম্বর</th>
</tr>

<tr><td>বাংলা</td><td>${student["বাংলা"]}</td></tr>
<tr><td>ইংরেজি</td><td>${student["ইংরেজি"]}</td></tr>
<tr><td>আইসিটি</td><td>${student["আইসিটি"]}</td></tr>
<tr><td>হিসাববিজ্ঞান</td><td>${student["হিসাববিজ্ঞান"]}</td></tr>
<tr><td>ব্যবসায় সংগঠন</td><td>${student["ব্যবসায় সংগঠন"]}</td></tr>
<tr><td>ব্যবস্থাপনা</td><td>${student["ব্যবস্থাপনা"]}</td></tr>
<tr><td>ফিন্যান্স ব্যাংকিং</td><td>${student["ফিন্যান্স ব্যাংকিং"]}</td></tr>

<tr>
<th>মোট</th>
<th>${student["মোট"]}</th>
</tr>

</table>
`;
}
</script>

</body>
</html>
