<!DOCTYPE html>
<html>
<head>
  <title>CSV Data</title>
</head>
<body>

<h2>Student Data</h2>
<div id="output"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6XYX-1NbB9VaFLmWKAi_Qjd5wy3_vWTTvPhP6kSW6eYZB-eGEhjT2mOiPQeSrZI7jRjUcf5uI_QuW/pub?output=csv")
.then(res => res.text())
.then(data => {
    let rows = data.split("\n");
    let html = "<table border='1'>";

    rows.forEach(row => {
        let cols = row.split(",");
        html += "<tr>";
        cols.forEach(col => {
            html += "<td>" + col + "</td>";
        });
        html += "</tr>";
    });

    html += "</table>";
    document.getElementById("output").innerHTML = html;
});
</script>

</body>
</html>
